<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人主页</title>
    <link rel="stylesheet" href="./css/personal.css">
</head>
<body>
    <div class="profile-container">
        <h1>个人主页</h1>

        <!-- 用户名显示（不可编辑） -->
        <div class="profile-item">
            <label>用户名:</label>
            <span id="username-display">加载中...</span>
        </div>

        <!-- 密码修改部分 -->
        <div class="profile-item">
            <label>密码:</label>
            <span>******</span>
            <button class="edit-button" data-action="show-edit" data-field="password">修改</button>
            <div id="password-edit" class="edit-form" style="display:none;">
                <input type="password" id="old-password" placeholder="原密码" required>
                <input type="password" id="new-password" placeholder="新密码" required>
                <button class="action-button" data-action="update-password">保存</button>
                <button class="action-button" data-action="hide-edit" data-field="password">取消</button>
            </div>
        </div>

        <!-- 真实姓名修改部分 -->
        <div class="profile-item">
            <label>真实姓名:</label>
            <span id="realname-display">加载中...</span>
            <button class="edit-button" data-action="show-edit" data-field="realname">修改</button>
            <div id="realname-edit" class="edit-form" style="display:none;">
                <input type="text" id="realname-input" placeholder="请输入真实姓名" required>
                <button class="action-button" data-action="update-profile" data-field="realname">保存</button>
                <button class="action-button" data-action="hide-edit" data-field="realname">取消</button>
            </div>
        </div>

        <!-- 班级修改部分 -->
        <div class="profile-item">
            <label>班级:</label>
            <span id="class-display">加载中...</span>
            <button class="edit-button" data-action="show-edit" data-field="class">修改</button>
            <div id="class-edit" class="edit-form" style="display:none;">
                <input type="text" id="class-input" placeholder="请输入班级" required>
                <button class="action-button" data-action="update-profile" data-field="class">保存</button>
                <button class="action-button" data-action="hide-edit" data-field="class">取消</button>
            </div>
        </div>

        <!-- 学号修改部分 -->
        <div class="profile-item">
            <label>学号:</label>
            <span id="studentid-display">加载中...</span>
            <button class="edit-button" data-action="show-edit" data-field="studentid">修改</button>
            <div id="studentid-edit" class="edit-form" style="display:none;">
                <input type="text" id="studentid-input" placeholder="请输入学号" required>
                <button class="action-button" data-action="update-profile" data-field="studentid">保存</button>
                <button class="action-button" data-action="hide-edit" data-field="studentid">取消</button>
            </div>
        </div>
    </div>
    <script src="./script/personal.js" type="module"></script>
</body>
</html>

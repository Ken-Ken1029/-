<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>云笔记系统登录页面</title>
    <link rel="stylesheet" href="./css/login.css">
</head>
<body>
    <div id="app" class="login-container">
        <img src="./img/login.jpg" class="login-image">
        <div class="login-div">
            <div v-show="data.isLogin" class="input-user">
                <h1>用户登录</h1>
                <input type="text" id="username" class="user-logn" v-model="data.username" placeholder="账号">
                <input type="password" id="password" class="user-logn" v-model="data.password" placeholder="密码">
                <a href="#" class="sign-up" @click="isLogin">注册</a>
                <a href="#" class="login-up" @click="login">登录</a>
                <p id="error-message" class="error-message">{{data.error}}</p>
            </div>
            <div v-show="!data.isLogin" class="input-user">
                <h1>用户注册</h1>
                <input type="text" id="username" class="user-sign" v-model="data.username" placeholder="请输入账号">
                <input type="password" id="password" class="user-sign" v-model="data.password" placeholder="请输入密码">
                <input type="password" id="password" class="user-sign" v-model="data.ispassword" placeholder="确认密码">
                <a href="#" class="sign-up" @click="isLogin">登录</a>
                <a href="#" class="login-up" @click="sign">注册</a>
                <p id="error-message" class="error-message">{{data.error}}</p>
            </div>
        </div>
    </div>

    <script src="./script/login.js" type="module"></script>
</body>
</html>
